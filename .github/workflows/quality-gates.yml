name: Quality Gates

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  mobile:
    name: Mobile TypeScript And Logic Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install mobile dependencies
        run: npm ci

      - name: Typecheck mobile app
        run: npm run typecheck

      - name: Run mobile logic tests
        run: npm test

  backend:
    name: Backend Pytest And Alembic SQL
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: fitmate
          POSTGRES_PASSWORD: fitmate
          POSTGRES_DB: fitmate
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U fitmate -d fitmate"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      FITMATE_ENV: local
      DATABASE_URL: postgresql+psycopg://fitmate:fitmate@localhost:5432/fitmate

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install backend dependencies
        run: python -m pip install -e "backend[dev]"

      - name: Run backend tests
        run: python -m pytest backend/tests

      - name: Render Alembic SQL
        working-directory: backend
        run: python -m alembic upgrade head --sql
